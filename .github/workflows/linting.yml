name: Linting Workflow
# Lint Rust source code and yaml files
on:
  workflow_call

jobs:
  yamllint:
    name: Yaml File Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python Toolchain
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.3'
      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint .

  clippy_check:
    name: Rust Code Formatting and Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run cargo-clippy
        run: cargo clippy --all-targets --all-features --release --  -D warnings
      - name: Run cargo-fmt
        run: cargo fmt --all -- --check
      - name: Build Release Binaries
        run: cargo build --release
      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            target/release/sashiko
            target/release/sashiko-cli
            target/release/benchmark
            target/release/ingest_benchmark
            target/release/review
          if-no-files-found: warn
          retention-days: 7
