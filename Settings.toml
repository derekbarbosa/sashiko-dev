log_level = "info"

[project]
name = "Sashiko (Linux Kernel)"
description = "Sashiko is an agentic Linux kernel code review system. It monitors public mailing lists to thoroughly evaluate proposed Linux kernel changes."
prompts_dir = "third_party/prompts/kernel"

[forge]
enabled = false

[subsystems]
mapping = [
    { pattern = ".*linux-kernel@vger.kernel.org.*", name = "LKML" },
    { pattern = ".*netdev@vger.kernel.org.*", name = "netdev" },
    { pattern = ".*bpf@vger.kernel.org.*", name = "bpf" },
    { pattern = ".*linux-usb@vger.kernel.org.*", name = "usb" },
    { pattern = ".*linux-fsdevel@vger.kernel.org.*", name = "fsdevel" },
    { pattern = ".*linux-mm@kvack.org.*", name = "linux-mm" }
]

[database]
url = "sashiko.db"
token = ""

[mailing_lists]
track = ["linux-kernel"]

[nntp]
server = "nntp.lore.kernel.org"
port = 119

[ai]
provider = "gemini"
model = "gemini-3.1-pro-preview"
max_input_tokens = 900000
max_interactions = 50
temperature = 1.0

[ai.claude]
prompt_caching = true

[server]
host = "127.0.0.1"
port = 8080

[git]
repository_path = "third_party/linux"

[review]
concurrency = 20
worktree_dir = "review_trees"
timeout_seconds = 7200
max_retries = 3
ignore_files = ["MAINTAINERS", ".mailmap", ".gitignore", "LICENSES/"]
